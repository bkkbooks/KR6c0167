front:
  text: 心經斫輪解序泰昌元年余于雲門結冬時值雨雪以寂寥中與二三法友聚話道及諸經吾輩輒演却心經一種未嘗措辭他日倘為人天座主不可于此徒默而去也余遂命筆注成厥工十日乃竣越明年天啓辛酉春聞一雨師開演楞嚴敬將此解往就正焉師既一覽卷而懷之承允作序乃講席內交際旁午其約不果以後再晤無期閲今不覺已七稔矣是解于囊包中檢出亦成故物矣然昔之所作今之所觀有不翅富歲之見凶歲燼之可矣乃聞五百比丘各解佛言而問誰當佛意佛云皆非我意衆曰既非佛意將無得罪佛云雖非我意各順正理堪為聖教有福無罪據此則舊解存留而有新意不妨後録以明先後皆解佛言耳且注經之志有欲就其廣博而樂多聞者有欲就其好簡而從略者亦欲就其彼此偏長得所宗者故講肆看解務要虗心不可是此以非彼故曰所惡執一者為其賊道也舉一而廢百也雖然心經之解如汗牛充棟其有金聲而玉振則余此解亦不復論量矣茲因福嚴蔡居士請梓以志其歲月如此別峰通容識
